name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Version number
  push:
    tags:
      - 'v*'
    paths:
      - 'crates/**'
      - 'Cargo.lock'
      - 'Cargo.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  LIB_NAME: pico_limbo_lib

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x86_64-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            name: linux-aarch64-gnu
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Build Library
        run: cargo build --release --target ${{ matrix.target }} --lib

      - name: Upload Library
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/lib${{ env.LIB_NAME }}.so

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: rustup target add aarch64-apple-darwin

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aarch64-apple-darwin-
            ${{ runner.os }}-cargo-

      - name: Build Library
        run: cargo build --release --target aarch64-apple-darwin --lib

      - name: Upload Library
        uses: actions/upload-artifact@v4
        with:
          name: lib-macos-aarch64
          path: target/aarch64-apple-darwin/release/lib${{ env.LIB_NAME }}.dylib

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-x86_64-pc-windows-msvc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-x86_64-pc-windows-msvc-
            ${{ runner.os }}-cargo-

      - name: Build Library
        run: cargo build --release --target x86_64-pc-windows-msvc --lib

      - name: Upload Library
        uses: actions/upload-artifact@v4
        with:
          name: lib-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/${{ env.LIB_NAME }}.dll

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release info
        id: release_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.version }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi
          
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "release_name=Release ${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Download library artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./temp-libs
          pattern: lib-*

      - name: Prepare library assets and generate checksums
        run: |
          mkdir -p ./release_assets
          cp ./temp-libs/lib-linux-x86_64-gnu/lib${{ env.LIB_NAME }}.so ./release_assets/lib${{ env.LIB_NAME }}-linux-x86_64-gnu.so
          cp ./temp-libs/lib-linux-aarch64-gnu/lib${{ env.LIB_NAME }}.so ./release_assets/lib${{ env.LIB_NAME }}-linux-aarch64-gnu.so
          cp ./temp-libs/lib-macos-aarch64/lib${{ env.LIB_NAME }}.dylib ./release_assets/lib${{ env.LIB_NAME }}-macos-aarch64.dylib
          cp ./temp-libs/lib-windows-x86_64/${{ env.LIB_NAME }}.dll ./release_assets/${{ env.LIB_NAME }}-windows-x86_64.dll
          
          cd ./release_assets
          for file in *; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "${file}.sha256"
            fi
          done

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          draft: false
          files: ./release_assets/*